<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>যোগাযোগ | Blood Donor</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="top-nav">
        <div class="logo">Blood <span>Donor</span></div>
    </nav>

    <div class="main-content-center">
        <div class="auth-wrapper glass" style="animation: slideInUp 0.8s ease;">
            <i class="fas fa-headset" style="font-size: 50px; color: var(--primary); margin-bottom: 20px;"></i>
            <h2 style="margin-bottom: 20px;">সরাসরি যোগাযোগ করুন</h2>
            
            <div style="text-align: left; display: flex; flex-direction: column; gap: 20px;">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="fas fa-envelope" style="color: var(--primary);"></i>
                    <span>support@blooddonor.com</span>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="fas fa-phone-alt" style="color: var(--primary);"></i>
                    <span>01568824786</span>
                </div>
                <div style="display: flex; align-items: center; gap: 15px;">
                    <i class="fab fa-facebook" style="color: #1877f2;"></i>
                    <span>ফেসবুক পেজ</span>
                </div>
            </div>

            <button class="red-btn" style="margin-top: 30px;" onclick="location.href='mailto:support@blooddonor.com'">মেইল করুন</button>
        </div>
    </div>

    <div class="bottom-nav">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>হোম</span></a>

        <a href="contact.html" class="nav-item active"><i class="fas fa-phone-alt"></i><span>যোগাযোগ</span></a>
    </div>
